# AMCL + map server for the MuJoCo backend. The robot spawns at the map
# origin, so AMCL self-initializes there (set_initial_pose) — no external
# initial-pose publisher needed.
amcl:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "sensors/lidar2d_0/scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    laser_max_range: 25.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    z_hit: 0.5
    z_rand: 0.5
    sigma_hit: 0.2
    update_min_a: 0.1
    update_min_d: 0.15
    resample_interval: 1
    transform_tolerance: 0.5
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    pf_err: 0.05
    pf_z: 0.99
    tf_broadcast: true

map_server:
  ros__parameters:
    yaml_filename: ""  # set by launch
